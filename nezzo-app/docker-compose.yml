version: '3.8'

services:
  nezzo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nezzo-app
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - nezzo-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "app.name=Nezzo App"
      - "app.description=Nezzo App Startseite mit allen Produkten"
      - "app.ceo=LobiGmbh"
      - "app.coo=JoviGmbh"
      - "app.products=Nezzo AI, Nezzo Chat, Nezzo Cloud, Nezzo Host, Nezzo Vocab, Nezzo Text"

networks:
  nezzo-network:
    driver: bridge
    name: nezzo-network
